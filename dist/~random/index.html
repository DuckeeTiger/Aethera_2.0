<script>
    // Create callout icons
    window.addEventListener("load", () => {
        document.querySelectorAll(".callout").forEach((elem) => {
            const icon = getComputedStyle(elem).getPropertyValue('--callout-icon');
            const iconName = icon && icon.trim().replace(/^lucide-/, "");

            if (iconName) {
                const calloutTitle = elem.querySelector(".callout-title");

                if (calloutTitle) {
                    const calloutIconContainer = document.createElement("div");
                    const calloutIcon = document.createElement("i");

                    calloutIconContainer.appendChild(calloutIcon);
                    calloutIcon.setAttribute("data-lucide", iconName);
                    calloutIconContainer.setAttribute("class", "callout-icon");
                    calloutTitle.insertBefore(calloutIconContainer, calloutTitle.firstChild);
                }
            }
        });

        lucide.createIcons();

        // Collapse callouts
        Array.from(document.querySelectorAll(".callout.is-collapsible")).forEach((elem) => {
            elem.querySelector('.callout-title').addEventListener("click", (event) => {
                if (elem.classList.contains("is-collapsed")) {
                    elem.classList.remove("is-collapsed");
                } else {
                    elem.classList.add("is-collapsed");
                }
            });
        });
    });
</script>

<script>
(function () {

    // =========================================
    // APPLY SAVED THEME ON LOAD
    // =========================================

    const savedTheme =
        localStorage.getItem("dg-theme") || "dark";

    document.documentElement.classList.remove(
        "theme-dark",
        "theme-light"
    );

    document.documentElement.classList.add(
        `theme-${savedTheme}`
    );

})();


// =========================================
// TOGGLE THEME
// =========================================

function toggleTheme() {

    const root = document.documentElement;

    const isDark =
        root.classList.contains("theme-dark");

    root.classList.remove(
        "theme-dark",
        "theme-light"
    );

    if (isDark) {

        root.classList.add("theme-light");

        localStorage.setItem(
            "dg-theme",
            "light"
        );

    } else {

        root.classList.add("theme-dark");

        localStorage.setItem(
            "dg-theme",
            "dark"
        );
    }

    updateThemeIcon();
}


// =========================================
// UPDATE BUTTON ICON
// =========================================

function updateThemeIcon() {

    const icon =
        document.getElementById("theme-icon");

    if (!icon) return;

    if (
        document.documentElement.classList.contains(
            "theme-dark"
        )
    ) {

        icon.textContent = "🌙";

    } else {

        icon.textContent = "☀️";
    }
}


// =========================================
// CREATE BUTTON
// =========================================

document.addEventListener(
    "DOMContentLoaded",
    () => {

        const sidebarButtons =
            document.querySelector(
                ".sidebar-buttons"
            );

        if (!sidebarButtons) return;

        const button =
            document.createElement("button");

        button.className =
            "clickable-icon sidebar-button";

        button.setAttribute(
            "aria-label",
            "Toggle theme"
        );

        button.onclick = toggleTheme;

        button.innerHTML =
            `<span id="theme-icon"></span>`;

        sidebarButtons.appendChild(button);

        updateThemeIcon();
    }
);
</script>
<script>

function getCurrentSiteLanguage() {
    const path =
        window.location.pathname.toLowerCase();

    if (path.startsWith("/hu/")) {
        return "hu";
    }

    if (path.startsWith("/en/")) {
        return "en";
    }

    const storedLanguage =
        localStorage.getItem("dg-language");

    if (storedLanguage === "hu" || storedLanguage === "en") {
        return storedLanguage;
    }

    return "en";
}

function isTranslatedPage(path) {
    return path.startsWith("/en/") || path.startsWith("/hu/");
}

function normalizeTranslationPath(path) {
    if (!path) return "";

    return path.endsWith("/")
        ? path
        : `${path}/`;
}

async function toggleLanguage() {
    const langFlag =
        document.getElementById("lang-flag");

    const currentLang =
        getCurrentSiteLanguage();

    const targetLang =
        currentLang === "en"
            ? "hu"
            : "en";

    localStorage.setItem(
        "dg-language",
        targetLang
    );

    window.dispatchEvent(
        new CustomEvent("dg-language-changed", {
            detail: targetLang
        })
    );

    if (langFlag) {
        langFlag.src =
            `/assets/flags/${targetLang}.svg`;
    }

    updateFiletreeLanguage();

    const currentPath =
        normalizeTranslationPath(window.location.pathname);

    if (!isTranslatedPage(currentPath)) {
        return;
    }

    try {
        const response =
            await fetch("/assets/translations.json");

        const translations =
            await response.json();

        let matchedTranslation = null;

        for (const trId in translations) {
            const entry = translations[trId];

            if (
                normalizeTranslationPath(entry[currentLang]) === currentPath
            ) {
                matchedTranslation = entry;
                break;
            }
        }

        if (
            matchedTranslation &&
            matchedTranslation[targetLang]
        ) {
            window.location.href =
                matchedTranslation[targetLang];
            return;
        }

        showTranslationToast(targetLang);

    } catch (err) {
        console.error(
            "[DG LANG] Translation lookup failed",
            err
        );
    }
}

function showTranslationToast(targetLang) {
    const existing =
        document.getElementById("translation-toast");

    if (existing) {
        existing.remove();
    }

    const toast =
        document.createElement("div");

    toast.id = "translation-toast";

    if (targetLang === "hu") {
        toast.textContent =
            "A fordítás még nincs kész. Hamarosan érkezik.";
    } else {
        toast.textContent =
            "Translation is not ready yet. Coming soon.";
    }

    toast.style.position = "fixed";
    toast.style.bottom = "24px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";

    toast.style.padding = "12px 18px";
    toast.style.borderRadius = "12px";

    toast.style.background = "rgba(30,30,30,0.95)";
    toast.style.color = "white";

    toast.style.zIndex = "99999";

    toast.style.fontSize = "14px";
    toast.style.fontWeight = "500";

    toast.style.boxShadow =
        "0 4px 18px rgba(0,0,0,0.35)";

    toast.style.backdropFilter =
        "blur(8px)";

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transition =
            "opacity 0.3s ease";
    }, 2500);

    setTimeout(() => {
        toast.remove();
    }, 3000);
}

function updateLanguageIcon() {
    const langFlag =
        document.getElementById("lang-flag");

    if (!langFlag) return;

    const currentLang =
        getCurrentSiteLanguage();

    if (currentLang === "en") {

        langFlag.src =
            "/assets/flags/en.svg";

    } else {

        langFlag.src =
            "/assets/flags/hu.svg";
    }
}

function updateFiletreeLanguage() {
    const currentLang =
        getCurrentSiteLanguage();

    const treeLinks =
        document.querySelectorAll(".filename");

    treeLinks.forEach(link => {
        const href =
            link.getAttribute("href");

        if (!href) return;

        const treeItem =
            link.closest("li");

        if (!treeItem) return;

        if (currentLang === "en") {
            if (href.startsWith("/hu/")) {
                treeItem.style.display = "none";
            } else {
                treeItem.style.display = "";
            }
        }

        if (currentLang === "hu") {
            if (href.startsWith("/en/")) {
                treeItem.style.display = "none";
            } else {
                treeItem.style.display = "";
            }
        }
    });
}

document.addEventListener("DOMContentLoaded", () => {

    updateLanguageIcon();
    updateFiletreeLanguage();

});

</script>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const checkLists = document.querySelectorAll(
        '.callout[data-callout="checks"] li'
    );

    checkLists.forEach((item, index) => {

        const text = item.textContent.trim();

        if (text === "[ ]") {

            const checkbox =
                document.createElement("input");

            checkbox.type = "checkbox";
            checkbox.checked = false;

            checkbox.classList.add(
                "dg-checkbox"
            );

            item.innerHTML = "";
            item.appendChild(checkbox);

            const saveKey =
                window.location.pathname +
                "-checkbox-" +
                index;

            const saved =
                localStorage.getItem(saveKey);

            if (saved !== null) {
                checkbox.checked =
                    saved === "true";
            }

            checkbox.addEventListener(
                "change",
                () => {

                    localStorage.setItem(
                        saveKey,
                        checkbox.checked
                    );

                }
            );
        }
    });
});

</script>
