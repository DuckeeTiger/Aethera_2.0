<script>
    // Create callout icons
    window.addEventListener("load", () => {
        document.querySelectorAll(".callout").forEach((elem) => {
            const icon = getComputedStyle(elem).getPropertyValue('--callout-icon');
            const iconName = icon && icon.trim().replace(/^lucide-/, "");

            if (iconName) {
                const calloutTitle = elem.querySelector(".callout-title");

                if (calloutTitle) {
                    const calloutIconContainer = document.createElement("div");
                    const calloutIcon = document.createElement("i");

                    calloutIconContainer.appendChild(calloutIcon);
                    calloutIcon.setAttribute("data-lucide", iconName);
                    calloutIconContainer.setAttribute("class", "callout-icon");
                    calloutTitle.insertBefore(calloutIconContainer, calloutTitle.firstChild);
                }
            }
        });

        lucide.createIcons();

        // Collapse callouts
        Array.from(document.querySelectorAll(".callout.is-collapsible")).forEach((elem) => {
            elem.querySelector('.callout-title').addEventListener("click", (event) => {
                if (elem.classList.contains("is-collapsed")) {
                    elem.classList.remove("is-collapsed");
                } else {
                    elem.classList.add("is-collapsed");
                }
            });
        });
    });
</script>

<script>

//
// APPLY SAVED THEME IMMEDIATELY
//
// Runs BEFORE page loads fully.
// Prevents white flash.
//

(function () {

    // Get saved theme from browser storage
    const savedTheme =
        localStorage.getItem("dg-theme") || "dark";

    // Remove old theme classes
    document.documentElement.classList.remove(
        "theme-dark",
        "theme-light"
    );

    // Apply saved theme
    document.documentElement.classList.add(
        `theme-${savedTheme}`
    );

})();


//
// THEME TOGGLE
//

function toggleTheme() {

    const body = document.documentElement;

    const isDark =
        body.classList.contains("theme-dark");

    // Remove existing classes
    body.classList.remove(
        "theme-dark",
        "theme-light"
    );

    // Toggle
    if (isDark) {

        body.classList.add("theme-light");

        localStorage.setItem(
            "dg-theme",
            "light"
        );

    } else {

        body.classList.add("theme-dark");

        localStorage.setItem(
            "dg-theme",
            "dark"
        );
    }

    updateThemeIcon();
}


//
// UPDATE THEME BUTTON ICON
//

function updateThemeIcon() {

    const icon =
        document.getElementById("theme-icon");

    if (!icon) return;

    if (
        document.documentElement.classList.contains("theme-dark")
    ) {

        icon.textContent = "🌙";

    } else {

        icon.textContent = "☀️";
    }
}


//
// LANGUAGE TOGGLE
//

function toggleLanguage() {

    const langFlag =
        document.getElementById("lang-flag");

    if (!langFlag) return;

    const currentLang =
        localStorage.getItem("dg-language") || "en";

    if (currentLang === "en") {

        localStorage.setItem("dg-language", "hu");

        langFlag.src = "/assets/flags/hu.svg";

    } else {

        localStorage.setItem("dg-language", "en");

        langFlag.src = "/assets/flags/en.svg";
    }
}


//
// INITIALIZE LANGUAGE BUTTON
//

function updateLanguageIcon() {

    const langFlag =
        document.getElementById("lang-flag");

    if (!langFlag) return;

    const currentLang =
        localStorage.getItem("dg-language") || "en";

    if (currentLang === "en") {

        langFlag.src = "/assets/flags/en.svg";

    } else {

        langFlag.src = "/assets/flags/hu.svg";
    }
}


//
// RUN AFTER PAGE LOAD
//

document.addEventListener("DOMContentLoaded", () => {

    updateThemeIcon();

    updateLanguageIcon();

});

</script>
